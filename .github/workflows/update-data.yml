name: Update schedule data

# NOTE: The league site (Cloudflare) blocks GitHub-hosted runners' datacenter
# IPs with HTTP 403, so the scrape cannot run on github-hosted runners. The
# scheduled/auto triggers are disabled to avoid constant failures. Refresh data
# from a residential network instead (see README "Keeping data fresh"):
#   - run `npm run fetch:all` locally and commit, or
#   - register a self-hosted runner on an always-on home machine, change
#     `runs-on` below to `self-hosted`, and re-enable the `schedule` trigger.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest data
        run: npm run fetch:all

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "chore: refresh league data"
            git push
          else
            echo "No data changes."
          fi
